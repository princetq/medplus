<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MedPlus Dược thư v11 Preview</title><style>body{font-family:Inter,Segoe UI,Arial,sans-serif;background:#f4faf5;color:#1f2a24;margin:0;line-height:1.65}.wrap{max-width:1100px;margin:0 auto;padding:24px}.top{position:sticky;top:0;background:rgba(244,250,245,.94);backdrop-filter:blur(8px);padding:12px 0;border-bottom:1px solid #cfe8d2}.row{display:flex;gap:10px;align-items:center}input,select{height:40px;border:1px solid #b8d9bf;border-radius:10px;padding:0 12px;font:inherit}input{flex:1}.card{background:#fff;border:1px solid #dcefe0;border-radius:18px;padding:22px;margin-top:18px;box-shadow:0 8px 28px rgba(27,94,32,.08)}h1{color:#1b5e20;margin:.2em 0}h2{font-size:1.28rem;color:#1b5e20;margin:1.2em 0 .4em;border-top:1px solid #e4f1e6;padding-top:.9em}.subheading{font-weight:800;color:#2e7d32;margin:.85em 0 .25em}.note{font-weight:800;color:#b35a00}.para{margin:.55em 0}.table{margin:14px 0;padding:10px;border:1px dashed #a5c9aa;border-radius:12px;background:#fbfffb}.table img{display:block;max-width:100%;height:auto;margin:8px auto;border:1px solid #ddd}.meta{color:#63756a;font-size:.9em}.badge{display:inline-block;background:#e8f5e9;color:#1b5e20;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.78em;margin-right:6px}code{background:#eef7ef;padding:2px 5px;border-radius:5px}</style></head><body><div class="top"><div class="wrap"><div class="row"><input id="q" placeholder="Tìm chuyên luận v11..."><select id="sel"></select></div></div></div><div class="wrap"><div id="out" class="card">Đang tải index...</div></div><script>const base='./duoc-thu-data-v11/';let idx=[];const q=document.getElementById('q'),sel=document.getElementById('sel'),out=document.getElementById('out');function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d')}function fill(list){sel.innerHTML=list.slice(0,120).map(r=>`<option value="${esc(r.id)}">${esc(r.title)}</option>`).join('')}async function load(id){const r=await fetch(base+id+'.json');const rec=await r.json();let h=`<h1>${esc(rec.title)}</h1><div class="meta"><span class="badge">v11 blocks</span>${esc(rec.source.book)} - ${esc(rec.source.edition)} - PDF ${rec.source.pdf_pages.start}-${rec.source.pdf_pages.end}</div>`;for(const b of rec.blocks){const loc=` <span class="meta">(tr. ${b.printed_page||b.page}, cột ${b.column===0?'trái':'phải'}, bbox ${Array.isArray(b.bbox)?b.bbox.join(', '):''})</span>`;if(b.type==='heading')h+=`<h2>${esc(b.text)}${loc}</h2>`;else if(b.type==='subheading')h+=`<div class="subheading">${esc(b.text)}${loc}</div>`;else if(b.type==='note')h+=`<div class="note">${esc(b.text)}${loc}</div>`;else if(b.type==='list')h+=`<ul><li>${(b.items||[b.text]).map(esc).join('</li><li>')}</li></ul>`;else if(b.type==='table'){h+=`<div class="table"><b>Bảng</b>${loc}<br><code>${esc(b.image_path||b.image||'')}</code>`; if(b.image_path) h+=`<img src="${esc(b.image_path)}" alt="Bảng ${esc(rec.title)}">`; h+='</div>'}else if(b.type==='figure')h+=`<div class="table"><b>Hình</b>${loc}</div>`;else h+=`<p class="para">${esc(b.text)}${loc}</p>`}out.innerHTML=h}fetch(base+'index.json').then(r=>r.json()).then(d=>{idx=d.records||[];fill(idx);out.textContent='Chọn một chuyên luận để xem blocks.';if(idx[0])load(idx[0].id)});sel.onchange=()=>load(sel.value);q.oninput=()=>{const n=norm(q.value);fill(idx.filter(r=>norm(r.title+' '+(r.aliases||[]).join(' ')).includes(n)))}</script></body></html>
