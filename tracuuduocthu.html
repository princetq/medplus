<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MedPlus Dược thư v11 - End-user Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --mp-900:#1b5e20;--mp-800:#1b5e20;--mp-700:#2e7d32;--mp-600:#2e7d32;--mp-500:#388e3c;--mp-50:#e8f5e9;
  --bg:#f4faf5;--surface:#ffffff;--surface-2:#f8fcf9;--text:#17251d;--muted:#64766b;--border:rgba(46,125,50,.18);--border-strong:rgba(46,125,50,.28);
  --shadow-xs:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 8px 28px rgba(30,107,64,.12);--shadow-lg:0 22px 70px rgba(10,40,20,.22);
  --font-body:'Inter','Segoe UI',system-ui,sans-serif;--font-display:'Nunito Sans','Inter','Segoe UI',system-ui,sans-serif;
  --trans:180ms cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:var(--font-body);font-size:16px;line-height:1.62;color:var(--text);background:radial-gradient(circle at top left,rgba(76,175,80,.12),transparent 36%),var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body.modal-open{overflow:hidden}
.page{max-width:1320px;margin:0 auto;padding:14px 20px 56px}
.header{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 16px;margin:0 0 16px;background:linear-gradient(135deg,rgba(232,245,233,.96),rgba(255,255,255,.92));border:1px solid var(--border-strong);border-radius:24px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.logo{flex:0 0 auto;width:88px;height:88px;border-radius:18px;background:linear-gradient(145deg,var(--mp-700),var(--mp-900));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(13,51,32,.25);text-align:center}
.logo .ico,.modal-logo .ico{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:21px;line-height:1;margin-bottom:4px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18)}
.logo .txt,.modal-logo .txt{font-family:var(--font-display);font-size:8px;line-height:1.05;font-weight:900;letter-spacing:.4px;text-transform:uppercase}
.logo .year,.modal-logo .year{font-family:var(--font-display);font-size:9px;line-height:1.05;font-weight:900;letter-spacing:.55px}
.brand{text-align:center;min-width:0}.brand h1{font-family:var(--font-display);font-size:clamp(28px,4vw,42px);line-height:1.1;margin:0;color:var(--text);letter-spacing:-.025em}.brand h1 strong{color:var(--mp-900)}.brand p{margin:7px 0 0;color:var(--muted);font-size:14px}
.toolbar{position:relative;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}.search{position:relative;flex:1 1 360px}.search input{width:100%;height:48px;border:1px solid var(--border-strong);border-radius:16px;background:#fff;padding:0 44px 0 16px;font-family:inherit;font-size:16px;color:var(--text);outline:none;box-shadow:var(--shadow-xs)}.search input:focus{border-color:var(--mp-700);box-shadow:0 0 0 4px rgba(46,125,50,.10)}
.count{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 14px;border-radius:999px;background:var(--mp-700);color:#fff;font-size:14px;font-weight:800;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.card{border:1px solid var(--border);background:rgba(255,255,255,.96);border-radius:18px;padding:16px;cursor:pointer;box-shadow:var(--shadow-xs);transition:transform var(--trans),box-shadow var(--trans),border-color var(--trans)}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-strong)}.card .kicker{display:inline-flex;align-items:center;border-radius:999px;background:var(--mp-50);color:var(--mp-900);padding:3px 8px;font-weight:900;font-size:11px;margin-bottom:9px}.card h3{font-family:var(--font-display);font-size:20px;line-height:1.22;color:var(--mp-900);margin:0 0 7px}.card p{margin:0;color:var(--muted);font-size:13px}
.empty{padding:28px;border:1px dashed var(--border-strong);border-radius:18px;background:rgba(255,255,255,.65);color:var(--muted)}
.modal{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(7,18,12,.45);backdrop-filter:blur(7px);padding:18px}.modal.show{display:flex}.modal-box{position:relative;width:min(960px,96vw);max-height:min(92vh,920px);overflow:auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:24px;box-shadow:var(--shadow-lg);scrollbar-width:none;-ms-overflow-style:none}.modal-box::-webkit-scrollbar{display:none;width:0;height:0}
.close{position:absolute;right:14px;top:12px;width:36px;height:36px;border:0;border-radius:999px;background:rgba(46,125,50,.09);color:var(--mp-900);font-size:24px;line-height:1;cursor:pointer;font-weight:700;z-index:3}.close:hover{background:rgba(46,125,50,.16)}
.modal-head{display:grid;grid-template-columns:88px minmax(0,1fr);gap:18px;align-items:center;margin:0;padding:22px 54px 20px 22px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(232,245,233,.92),rgba(255,255,255,.94));border-radius:24px 24px 0 0}.modal-logo{width:88px;height:88px;border-radius:18px;background:linear-gradient(145deg,var(--mp-700),var(--mp-900));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(13,51,32,.22);text-align:center}
.title-wrap{min-width:0}.title-wrap h2{font-family:var(--font-display);font-size:clamp(25px,3.2vw,34px);line-height:1.13;margin:0 0 8px;color:var(--mp-900);letter-spacing:-.025em}.title-wrap p{margin:0;color:var(--muted);font-size:13px}
.modal-body{padding:22px 26px 30px}
.duoc-intro{padding:0 0 14px;margin:0 0 12px;border-bottom:1px solid var(--border)}.duoc-intro-title{font-family:var(--font-display);font-size:22px;line-height:1.25;margin:0 0 10px;color:var(--mp-900);font-weight:900}.duoc-intro p{margin:0 0 8px}
.duoc-section{border:1px solid var(--border);border-radius:14px;margin:0 0 10px;overflow:hidden;background:#fff}.duoc-section summary{padding:13px 18px;background:var(--surface-2);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--mp-900);font-family:var(--font-display);font-weight:900;font-size:18px}.duoc-section summary::-webkit-details-marker{display:none}.duoc-section summary::after{content:'⌄';font-family:var(--font-body);font-size:20px;line-height:1;transition:transform var(--trans)}.duoc-section[open] summary::after{transform:rotate(180deg)}.section-body{padding:15px 18px 17px}
.duoc-block{margin:0 0 12px}.duoc-block p{margin:0 0 9px;color:var(--text)}.duoc-subheading h4{font-family:var(--font-display);font-size:16.5px;line-height:1.35;margin:14px 0 6px;color:var(--mp-900);font-weight:900}.duoc-note{padding:12px 14px;border-left:4px solid var(--mp-700);background:rgba(232,245,233,.65);border-radius:12px;color:var(--text)}.duoc-list{margin:0 0 12px;padding-left:22px}.duoc-list li{margin:4px 0}
.duoc-table,.duoc-figure{margin:18px 0;padding:13px;border:1px solid var(--border);border-radius:16px;background:var(--surface-2)}.duoc-table-title,.duoc-figure-title{font-weight:900;color:var(--mp-900);margin-bottom:8px}.duoc-table img,.duoc-figure img{display:block;max-width:100%;height:auto;margin:0 auto;border:1px solid rgba(46,125,50,.22);border-radius:8px;background:#fff}.asset-note{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
.loading{padding:30px;color:var(--muted)}
@media(max-width:720px){.page{padding:10px 10px 34px}.header{justify-content:flex-start;padding:12px}.logo{width:64px;height:64px;border-radius:15px}.logo .ico{width:30px;height:30px;font-size:16px;margin-bottom:3px}.logo .txt{font-size:6.5px}.logo .year{font-size:7.5px}.brand{text-align:left}.brand p{font-size:12px}.grid{grid-template-columns:1fr}.modal{padding:0}.modal-box{width:100vw;height:100dvh;max-height:none;border-radius:0}.modal-head{grid-template-columns:70px minmax(0,1fr);gap:12px;padding:18px 48px 16px 14px;border-radius:0}.modal-logo{width:70px;height:70px;border-radius:17px}.modal-logo .ico{width:30px;height:30px;font-size:16px;margin-bottom:3px}.modal-logo .txt{font-size:6.5px}.modal-logo .year{font-size:7.5px}.modal-body{padding:18px}.close{right:9px;top:9px}}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="logo" aria-hidden="true"><span class="ico">📚</span><span class="txt">Dược thư</span><span class="year">2023</span></div>
    <div class="brand"><h1><strong>Dược thư</strong> Quốc gia Việt Nam</h1><p>End-user preview v11: danh sách + modal dạng toggle như bản chuẩn.</p></div>
  </header>
  <div class="toolbar"><div class="search"><input id="q" placeholder="Tìm hoạt chất, tên chuyên luận..."></div><div class="count" id="count">Đang tải...</div></div>
  <main id="results" class="grid"></main>
</div>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Chuyên luận Dược thư"><div class="modal-box" id="modal-box"></div></div>
<script>
const DATA_BASE='duoc-thu-data-v11/';
let indexRecords=[], filtered=[], recordCache=new Map();
const q=document.getElementById('q'), results=document.getElementById('results'), count=document.getElementById('count'), modal=document.getElementById('modal'), modalBox=document.getElementById('modal-box');
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function pageRange(source){const p=source&&source.printed_pages||{};if(p.start&&p.end&&p.end!==p.start)return p.start+'–'+p.end;if(p.start)return String(p.start);const pdf=source&&source.pdf_pages||{};if(pdf.start&&pdf.end&&pdf.end!==pdf.start)return 'PDF '+pdf.start+'–'+pdf.end;if(pdf.start)return 'PDF '+pdf.start;return '';}
function sourceLabel(rec){const src=rec.source||{};const range=pageRange(src);return (src.book||'Dược thư Quốc gia Việt Nam')+' - '+(src.edition||'Lần xuất bản thứ ba, 2023')+(range?' - Trang '+range:'');}
function assetPath(path){return String(path||'').replace(/^\.\//,'');}
function visibleItems(list){return list.slice(0,96);}
function renderList(list){const items=visibleItems(list);count.textContent=list.length+' chuyên luận';if(!items.length){results.innerHTML='<div class="empty">Không tìm thấy chuyên luận.</div>';return;}results.innerHTML=items.map(r=>{const range=pageRange(r.source||{});return '<article class="card" data-id="'+esc(r.id)+'"><span class="kicker">Dược thư 2023</span><h3>'+esc(r.title)+'</h3><p>'+esc(range?'Trang '+range:'Chuyên luận Dược thư')+'</p></article>';}).join('');}
async function getRecord(id){if(recordCache.has(id))return recordCache.get(id);const res=await fetch(DATA_BASE+encodeURIComponent(id)+'.json');if(!res.ok)throw new Error('Không tải được '+id+'.json');const rec=await res.json();recordCache.set(id,rec);return rec;}
function renderInlineBlock(b){
  const type=b.type||'paragraph';const txt=esc(b.text||'');
  if(type==='subheading')return '<section class="duoc-block duoc-subheading"><h4>'+txt+'</h4></section>';
  if(type==='note')return '<section class="duoc-block duoc-note"><p>'+txt+'</p></section>';
  if(type==='list'){const items=Array.isArray(b.items)?b.items:[b.text||''];return '<ul class="duoc-block duoc-list">'+items.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul>';}
  if(type==='table'){const img=assetPath(b.image||b.image_path||'');return '<figure class="duoc-table"><div class="duoc-table-title">'+esc(b.title||'Bảng')+'</div>'+(img?'<img src="'+esc(img)+'" alt="'+esc(b.title||'Bảng Dược thư')+'"><div class="asset-note">Ảnh bảng: '+esc(img)+'</div>':'<div class="asset-note">Bảng chưa có ảnh.</div>')+'</figure>';}
  if(type==='figure'){const img=assetPath(b.image||b.image_path||'');return '<figure class="duoc-figure"><div class="duoc-figure-title">'+esc(b.title||'Hình')+'</div>'+(img?'<img src="'+esc(img)+'" alt="'+esc(b.title||'Hình Dược thư')+'"><div class="asset-note">Ảnh hình: '+esc(img)+'</div>':'<div class="asset-note">Hình chưa có ảnh.</div>')+'</figure>';}
  return '<section class="duoc-block"><p>'+txt+'</p></section>';
}
function isTopHeading(b){return b && b.type==='heading' && Number(b.level||2)<=2;}
function buildSections(blocks){
  const intro=[]; const sections=[]; let current=null; let seenFirstHeading=false;
  blocks.forEach((b,idx)=>{
    if(b.type==='heading' && Number(b.level||1)===1 && !seenFirstHeading){
      seenFirstHeading=true;
      intro.push(b);
      return;
    }
    if(isTopHeading(b)){
      current={title:b.text||'Mục', blocks:[]};
      sections.push(current);
      return;
    }
    if(current) current.blocks.push(b);
    else intro.push(b);
  });
  return {intro, sections};
}
function renderIntro(blocks){
  return '<div class="duoc-intro">'+blocks.map((b,i)=>{
    if(b.type==='heading')return '<h3 class="duoc-intro-title">'+esc(b.text||'')+'</h3>';
    return renderInlineBlock(b);
  }).join('')+'</div>';
}
function renderSection(sec,idx){
  return '<details class="duoc-section"><summary>'+esc(sec.title)+'</summary><div class="section-body">'+sec.blocks.map(renderInlineBlock).join('')+'</div></details>';
}
function renderModal(rec){
  const blocks=Array.isArray(rec.blocks)?rec.blocks:[];
  const grouped=buildSections(blocks);
  return '<button class="close" aria-label="Đóng">×</button>'
    +'<div class="modal-head"><div class="modal-logo" aria-hidden="true"><span class="ico">📚</span><span class="txt">Dược thư</span><span class="year">2023</span></div>'
    +'<div class="title-wrap"><h2>'+esc(rec.title||'Chuyên luận')+'</h2><p>'+esc(sourceLabel(rec))+'</p></div></div>'
    +'<div class="modal-body">'+renderIntro(grouped.intro)+grouped.sections.map(renderSection).join('')+'</div>';
}
async function openRecord(id){modalBox.innerHTML='<div class="loading">Đang tải chuyên luận...</div>';modal.classList.add('show');document.body.classList.add('modal-open');try{const rec=await getRecord(id);modalBox.innerHTML=renderModal(rec);modalBox.querySelector('.close').addEventListener('click',closeModal);}catch(e){modalBox.innerHTML='<button class="close" aria-label="Đóng">×</button><div class="loading">'+esc(e.message||e)+'</div>';modalBox.querySelector('.close').addEventListener('click',closeModal);}}
function closeModal(){modal.classList.remove('show');document.body.classList.remove('modal-open');modalBox.innerHTML='';}
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('show'))closeModal();});results.addEventListener('click',e=>{const card=e.target.closest('[data-id]');if(card)openRecord(card.dataset.id);});
q.addEventListener('input',()=>{const n=norm(q.value);filtered=n?indexRecords.filter(r=>norm((r.title||'')+' '+(r.aliases||[]).join(' ')).includes(n)):indexRecords;renderList(filtered);});
function showIndexError(err){const isFile=location.protocol==='file:';count.textContent='Lỗi index';results.innerHTML='<div class="empty"><h2>Không tải được index</h2><p>'+esc(err.message||err)+'</p>'+(isFile?'<p>Bạn đang mở bằng <code>file://</code>. Hãy chạy <b>start-v11-local.bat</b>.</p>':'')+'</div>';}
fetch(DATA_BASE+'index.json').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status+' khi tải index.json');return r.json();}).then(d=>{indexRecords=d.records||[];filtered=indexRecords;renderList(filtered);}).catch(showIndexError);
</script>
</body>
</html>
