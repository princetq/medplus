<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khoa Dược - BVĐK Tỉnh Tuyên Quang</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;overflow:hidden;background:#f4f6f9}
    body{position:relative}

    .custom-navbar{
      background:linear-gradient(135deg,#2d6218 0%,#37761d 60%,#429021 100%);
      color:#fff;
      padding:0 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      height:52px;
      box-shadow:0 2px 16px rgba(55,118,29,.4);
      position:relative;
      z-index:1000;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .logo-circle{
      width:38px;
      height:38px;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      box-shadow:0 4px 12px rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.72);
      overflow:hidden;
      padding:0;
    }

    .site-logo{
      width:34px;
      height:34px;
      object-fit:cover;
      display:block;
      margin:0;
    }

    .brand-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 12px;
      border-radius:999px;
      background:linear-gradient(135deg,#e8f5ff,#ffffff);
      color:#0f4c81;
      font-weight:900;
      letter-spacing:1px;
      font-size:.76rem;
      text-transform:uppercase;
      box-shadow:0 4px 14px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.85);
      border:1px solid rgba(255,255,255,.7);
      white-space:nowrap;
    }

    .nav-links{display:flex;align-items:center;gap:5px}
    .nav-links button{
      color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      box-shadow:0 2px 8px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.25);
      font-size:.8rem;font-weight:600;padding:6px 11px;border-radius:8px;
      white-space:nowrap;letter-spacing:.25px;cursor:pointer;transition:.25s;font-family:inherit
    }
    .nav-links button:hover{background:rgba(255,255,255,.28);box-shadow:0 4px 14px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.35);transform:translateY(-1px)}
    .nav-links button.active{background:rgba(255,255,255,.35);box-shadow:0 4px 14px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.4);border-color:rgba(255,255,255,.6)}

    .hamburger{
      display:none;
      width:32px;
      height:32px;
      padding:0;
      border:none;
      background:transparent;
      box-shadow:none;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:4px;
      cursor:pointer;
      flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .hamburger:hover{background:transparent;box-shadow:none}
    .hamburger span{display:block;width:17px;height:2px;background:#fff;border-radius:2px;transition:.25s}
    .hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

    .mobile-menu{
      display:none;
      position:absolute;
      top:52px;
      left:0;
      right:0;
      background:linear-gradient(160deg,#2d6218 0%,#37761d 100%);
      box-shadow:0 8px 24px rgba(55,118,29,.4);
      z-index:999;
      flex-direction:column;
      padding:10px 14px 12px;
      gap:7px;
      border-top:1px solid rgba(255,255,255,.15)
    }
    .mobile-menu.open{display:flex}
    .mobile-menu button{
      color:#fff;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      box-shadow:0 2px 8px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.2);
      font-size:.88rem;font-weight:600;padding:10px 14px;border-radius:8px;
      letter-spacing:.3px;cursor:pointer;text-align:left;transition:.2s;font-family:inherit;width:100%
    }
    .mobile-menu button:hover{background:rgba(255,255,255,.25)}
    .mobile-menu button.active{background:rgba(255,255,255,.32);border-color:rgba(255,255,255,.55)}

    .web-container{width:100%;height:calc(var(--vh, 1vh) * 100 - 52px);position:relative}
    .embedded-site{
      position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff;
      -webkit-overflow-scrolling:touch;overscroll-behavior:contain
    }
    .embedded-site.active{display:block}

    @media (max-width:768px){
      .nav-links{display:none}
      .hamburger{display:flex}
      .logo-circle{width:36px;height:36px}
      .site-logo{width:32px;height:32px}
      .brand-badge{padding:5px 10px;font-size:.7rem;letter-spacing:.9px}
      .custom-navbar{padding:0 10px}
    }
  </style>
</head>
<body>
  <header class="custom-navbar">
    <div class="logo-wrap">
      <div class="logo-circle">
        <img src="./icons/medplus-logo.webp" alt="MedPlus Logo" class="site-logo">
      </div>
      <div class="brand-badge">MEDPLUS</div>
    </div>

    <nav class="nav-links" id="desktopNav">
      <button data-tab="medplus" onclick="switchTab('medplus')" class="active">TRA CỨU THUỐC</button>
      <button data-tab="chuyenmon" onclick="switchTab('chuyenmon')">CẬP NHẬT CHUYÊN MÔN</button>
      <button data-tab="phacdieu_tri" onclick="switchTab('phacdieu_tri')">PHÁC ĐỒ ĐIỀU TRỊ</button>
      <button data-tab="lichtruc" onclick="switchTab('lichtruc')">LỊCH TRỰC</button>
      <button data-tab="lienhe" onclick="switchTab('lienhe')">LIÊN HỆ</button>
    </nav>

    <button class="hamburger" id="hamburgerBtn" aria-label="Mở menu"><span></span><span></span><span></span></button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <button data-tab="medplus" onclick="switchTab('medplus', true)" class="active">💊 TRA CỨU THUỐC</button>
    <button data-tab="chuyenmon" onclick="switchTab('chuyenmon', true)">📚 CẬP NHẬT CHUYÊN MÔN</button>
    <button data-tab="phacdieu_tri" onclick="switchTab('phacdieu_tri', true)">📋 PHÁC ĐỒ ĐIỀU TRỊ</button>
    <button data-tab="lichtruc" onclick="switchTab('lichtruc', true)">📅 LỊCH TRỰC</button>
    <button data-tab="lienhe" onclick="switchTab('lienhe', true)">📞 LIÊN HỆ</button>
  </nav>

  <main class="web-container">
    <iframe id="iframe-medplus" class="embedded-site active"
      src="https://ngocanh.io.vn/index.html"
      loading="eager"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

    <iframe id="iframe-chuyenmon" class="embedded-site"
      data-src="https://googlesites.princetq.workers.dev/c%E1%BA%ADp-nh%E1%BA%ADt-chuy%C3%AAn-m%C3%B4n"
      loading="lazy"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

    <iframe id="iframe-phacdieu_tri" class="embedded-site"
      data-src="https://googlesites.princetq.workers.dev/ph%C3%A1c-%C4%91%E1%BB%93-%C4%91i%E1%BB%81u-tr%E1%BB%8B"
      loading="lazy"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

    <iframe id="iframe-lichtruc" class="embedded-site"
      data-src="https://googlesites.princetq.workers.dev/l%E1%BB%8Bch-tr%E1%BB%B1c"
      loading="lazy"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

    <iframe id="iframe-lienhe" class="embedded-site"
      data-src="https://googlesites.princetq.workers.dev/li%C3%AAn-h%E1%BB%87"
      loading="lazy"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
  </main>

  <script>
    const TAB_IDS = ['medplus','chuyenmon','phacdieu_tri','lichtruc','lienhe'];
    let currentTab = 'medplus';

    function setVh() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }

    function clearActiveButtons() {
      document.querySelectorAll('#desktopNav button, #mobileMenu button').forEach(b => b.classList.remove('active'));
    }

    function setActive(id) {
      currentTab = id;
      document.querySelectorAll('.embedded-site').forEach(f => f.classList.remove('active'));
      clearActiveButtons();
      const iframe = document.getElementById('iframe-' + id);
      if (iframe) {
        iframe.classList.add('active');
        if (!iframe.src && iframe.dataset.src) iframe.src = iframe.dataset.src;
      }
      document.querySelectorAll('[data-tab="' + id + '"]').forEach(b => b.classList.add('active'));
    }

    function reloadIframe(id) {
      const iframe = document.getElementById('iframe-' + id);
      if (!iframe) return;
      const src = iframe.src || iframe.dataset.src;
      if (!src) return;
      iframe.src = '';
      requestAnimationFrame(() => { iframe.src = src; });
    }

    function switchTab(id, isMobile = false) {
      if (!TAB_IDS.includes(id)) return;
      if (id === currentTab) reloadIframe(id);
      else setActive(id);
      if (isMobile) {
        document.getElementById('hamburgerBtn').classList.remove('open');
        document.getElementById('mobileMenu').classList.remove('open');
      }
    }

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('hamburgerBtn').classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    document.addEventListener('DOMContentLoaded', () => {
      setVh();
      setActive('medplus');
    });

    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', setVh);

    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'inner-nav') return;
      document.querySelectorAll('#desktopNav button, #mobileMenu button').forEach(b => b.classList.remove('active'));
    });
  </script>
</body>
</html>
