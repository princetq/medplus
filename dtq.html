<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khoa Dược - BVĐK Tỉnh Tuyên Quang</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;overflow:hidden;background:#f4f6f9}
    body{position:relative}

    .custom-navbar{
      background:linear-gradient(135deg,#2d6218 0%,#37761d 60%,#429021 100%);
      color:#fff;
      padding:0 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      height:52px;
      box-shadow:0 2px 16px rgba(55,118,29,.4);
      position:relative;
      z-index:1000;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .logo-circle{
      width:38px;
      height:38px;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      box-shadow:0 4px 12px rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.88);
      overflow:hidden;
      padding:0;
    }

    .site-logo{
      width:100%;
      height:100%;
      display:block;
    }

    .brand-badge{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 14px;
      border-radius:999px;
      color:#fff;
      font-weight:900;
      letter-spacing:1.2px;
      font-size:.74rem;
      text-transform:uppercase;
      white-space:nowrap;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        0 10px 26px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.35);
      backdrop-filter:blur(16px) saturate(170%);
      -webkit-backdrop-filter:blur(16px) saturate(170%);
      overflow:hidden;
    }

    .brand-badge::before{
      content:'';
      position:absolute;
      inset:0;
      padding:1px;
      border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.62),rgba(255,255,255,.08),rgba(255,255,255,.28));
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .brand-badge::after{
      content:'';
      position:absolute;
      inset:1px 1px auto 1px;
      height:42%;
      border-radius:999px;
      background:linear-gradient(to bottom,rgba(255,255,255,.42),rgba(255,255,255,0));
      pointer-events:none;
    }

    .nav-links{display:flex;align-items:center;gap:5px}
    .nav-links button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:30px;
      padding:0 11px;
      line-height:1;
      color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      box-shadow:0 2px 8px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.25);
      font-size:.8rem;font-weight:600;border-radius:8px;
      white-space:nowrap;letter-spacing:.25px;cursor:pointer;transition:.25s;font-family:inherit
    }
    .nav-links button:hover{background:rgba(255,255,255,.28);box-shadow:0 4px 14px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.35);transform:translateY(-1px)}
    .nav-links button.active{background:rgba(255,255,255,.35);box-shadow:0 4px 14px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.4);border-color:rgba(255,255,255,.6)}

    .hamburger{
      display:none;
      width:32px;
      height:32px;
      padding:0;
      border:none;
      background:transparent;
      box-shadow:none;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:4px;
      cursor:pointer;
      flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .hamburger:hover{background:transparent;box-shadow:none}
    .hamburger span{display:block;width:17px;height:2px;background:#fff;border-radius:2px;transition:.25s}
    .hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

    .mobile-menu{
      display:none;
      position:fixed;
      top:52px;
      right:0;
      width:75vw;
      max-width:none;
      min-width:0;
      height:calc(var(--vh, 1vh) * 100 - 52px);
      padding:12px 12px 14px;
      z-index:9999;
      flex-direction:column;
      gap:8px;
      background:linear-gradient(180deg,rgba(45,98,24,.98) 0%,rgba(55,118,29,.96) 100%);
      border-left:1px solid rgba(255,255,255,.14);
      box-shadow:
        -18px 0 40px rgba(0,0,0,.22),
        inset 1px 0 0 rgba(255,255,255,.12);
      backdrop-filter:blur(18px) saturate(165%);
      -webkit-backdrop-filter:blur(18px) saturate(165%);
      transform:translateX(100%);
      transition:transform .24s ease, opacity .24s ease;
      opacity:0;
      overflow-y:auto;
      overscroll-behavior:contain;
    }
    .mobile-menu.open{display:flex;transform:translateX(0);opacity:1}
    .mobile-menu::before{
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.20), transparent 34%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.12), transparent 28%);
    }

    .mobile-menu button{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:46px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.25px;
      text-align:center;
      cursor:pointer;
      transition:.22s ease;
      box-shadow:
        0 6px 16px rgba(0,0,0,.10),
        inset 0 1px 0 rgba(255,255,255,.20);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
    }
    .mobile-menu button::before{content:none}
    .mobile-menu button:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.20);
      border-color:rgba(255,255,255,.30);
      box-shadow:
        0 10px 20px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.26);
    }
    .mobile-menu button.active{
      background:rgba(255,255,255,.28);
      border-color:rgba(255,255,255,.42);
      box-shadow:
        0 12px 24px rgba(0,0,0,.14),
        inset 0 1px 0 rgba(255,255,255,.34);
    }

    .menu-overlay{
      display:none;
      position:fixed;
      top:52px;
      left:0;
      right:25vw;
      bottom:0;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      z-index:9998;
    }
    .menu-overlay.open{display:block}

    .page-wrap{
      position:relative;
      left:0;
      transition:left .24s ease, transform .24s ease;
    }
    .page-wrap.shifted{left:-75vw}

    .web-container{width:100%;height:calc(var(--vh, 1vh) * 100 - 52px);position:relative}
    .embedded-site{
      position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff;
      -webkit-overflow-scrolling:touch;overscroll-behavior:contain
    }
    .embedded-site.active{display:block}

    @media (max-width:768px){
      .nav-links{display:none}
      .hamburger{display:flex}
      .logo-circle{width:36px;height:36px}
      .site-logo{width:34px;height:34px}
      .brand-badge{padding:5px 10px;font-size:.7rem;letter-spacing:.9px}
      .custom-navbar{padding:0 10px}
    }
  </style>
</head>
<body>
  <header class="custom-navbar">
    <div class="logo-wrap">
      <div class="logo-circle">
        <img
          class="site-logo"
          alt="MedPlus Logo"
          src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%234caf50'/><stop offset='100%' stop-color='%232e7d32'/></linearGradient><linearGradient id='h' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='%23ffffff' stop-opacity='.98'/><stop offset='100%' stop-color='%23e8f5e9' stop-opacity='.92'/></linearGradient></defs><circle cx='32' cy='32' r='30' fill='url(%23g)'/><circle cx='32' cy='32' r='27' fill='none' stroke='%23ffffff' stroke-opacity='.7' stroke-width='2'/><rect x='29' y='15' width='6' height='34' rx='3' fill='url(%23h)'/><rect x='15' y='29' width='34' height='6' rx='3' fill='url(%23h)'/><path d='M43 16h5l-8 12-4-2z' fill='%23a5d6a7' opacity='.95'/><path d='M21 48h-5l8-12 4 2z' fill='%23a5d6a7' opacity='.95'/></svg>"
        >
      </div>
      <div class="brand-badge">MEDPLUS</div>
    </div>

    <nav class="nav-links" id="desktopNav">
      <button data-tab="medplus" onclick="switchTab('medplus')" class="active">TRA CỨU THUỐC</button>
      <button data-tab="chuyenmon" onclick="switchTab('chuyenmon')">CẬP NHẬT CHUYÊN MÔN</button>
      <button data-tab="phacdieu_tri" onclick="switchTab('phacdieu_tri')">PHÁC ĐỒ ĐIỀU TRỊ</button>
      <button data-tab="lichtruc" onclick="switchTab('lichtruc')">LỊCH TRỰC</button>
      <button data-tab="lienhe" onclick="switchTab('lienhe')">LIÊN HỆ</button>
    </nav>

    <button class="hamburger" id="hamburgerBtn" aria-label="Mở menu"><span></span><span></span><span></span></button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <button data-tab="medplus" onclick="switchTab('medplus', true)" class="active">TRA CỨU THUỐC</button>
    <button data-tab="chuyenmon" onclick="switchTab('chuyenmon', true)">CẬP NHẬT CHUYÊN MÔN</button>
    <button data-tab="phacdieu_tri" onclick="switchTab('phacdieu_tri', true)">PHÁC ĐỒ ĐIỀU TRỊ</button>
    <button data-tab="lichtruc" onclick="switchTab('lichtruc', true)">LỊCH TRỰC</button>
    <button data-tab="lienhe" onclick="switchTab('lienhe', true)">LIÊN HỆ</button>
  </nav>

  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="page-wrap" id="pageWrap">
    <main class="web-container">
      <iframe id="iframe-medplus" class="embedded-site active"
        src="https://ngocanh.io.vn/index.html"
        loading="eager"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

      <iframe id="iframe-chuyenmon" class="embedded-site"
        data-src="https://googlesites.princetq.workers.dev/c%E1%BA%ADp-nh%E1%BA%ADt-chuy%C3%AAn-m%C3%B4n"
        loading="lazy"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

      <iframe id="iframe-phacdieu_tri" class="embedded-site"
        data-src="https://googlesites.princetq.workers.dev/ph%C3%A1c-%C4%91%E1%BB%93-%C4%91i%E1%BB%81u-tr%E1%BB%8B"
        loading="lazy"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

      <iframe id="iframe-lichtruc" class="embedded-site"
        data-src="https://googlesites.princetq.workers.dev/l%E1%BB%8Bch-tr%E1%BB%B1c"
        loading="lazy"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>

      <iframe id="iframe-lienhe" class="embedded-site"
        data-src="https://googlesites.princetq.workers.dev/li%C3%AAn-h%E1%BB%87"
        loading="lazy"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
    </main>
  </div>

  <script>
    const TAB_IDS = ['medplus','chuyenmon','phacdieu_tri','lichtruc','lienhe'];
    let currentTab = 'medplus';

    function setVh() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }

    function clearActiveButtons() {
      document.querySelectorAll('#desktopNav button, #mobileMenu button').forEach(b => b.classList.remove('active'));
    }

    function setActive(id) {
      currentTab = id;
      document.querySelectorAll('.embedded-site').forEach(f => f.classList.remove('active'));
      clearActiveButtons();
      const iframe = document.getElementById('iframe-' + id);
      if (iframe) {
        iframe.classList.add('active');
        if (!iframe.src && iframe.dataset.src) iframe.src = iframe.dataset.src;
      }
      document.querySelectorAll('[data-tab="' + id + '"]').forEach(b => b.classList.add('active'));
    }

    function reloadIframe(id) {
      const iframe = document.getElementById('iframe-' + id);
      if (!iframe) return;
      const src = iframe.src || iframe.dataset.src;
      if (!src) return;
      iframe.src = '';
      requestAnimationFrame(() => { iframe.src = src; });
    }

    function closeMobileMenu() {
      document.getElementById('hamburgerBtn').classList.remove('open');
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('menuOverlay').classList.remove('open');
      document.getElementById('pageWrap').classList.remove('shifted');
    }

    function openMobileMenu() {
      document.getElementById('hamburgerBtn').classList.add('open');
      document.getElementById('mobileMenu').classList.add('open');
      document.getElementById('menuOverlay').classList.add('open');
      document.getElementById('pageWrap').classList.add('shifted');
    }

    function switchTab(id, isMobile = false) {
      if (!TAB_IDS.includes(id)) return;
      if (id === currentTab) reloadIframe(id);
      else setActive(id);
      if (isMobile) closeMobileMenu();
    }

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      const menu = document.getElementById('mobileMenu');
      if (menu.classList.contains('open')) closeMobileMenu();
      else openMobileMenu();
    });

    document.getElementById('menuOverlay').addEventListener('click', closeMobileMenu);

    document.addEventListener('DOMContentLoaded', () => {
      setVh();
      setActive('medplus');
    });

    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', setVh);

    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'inner-nav') return;
      document.querySelectorAll('#desktopNav button, #mobileMenu button').forEach(b => b.classList.remove('active'));
    });
  </script>
</body>
</html>
