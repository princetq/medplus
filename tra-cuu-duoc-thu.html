<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tra cứu Dược thư Quốc gia Việt Nam</title>
<meta name="medplus-duoc-thu-version" content="v9.0-redesign">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS — MedPlus Dược Thư v9
   Palette: Clinical Green — deep forest tones, 
   warm white surfaces, precise type
═══════════════════════════════════════════════════ */
:root {
  /* Primary palette */
  --mp-900: #1b5e20;
  --mp-800: #1b5e20;
  --mp-700: #2e7d32;
  --mp-600: #2e7d32;
  --mp-500: #388e3c;
  --mp-400: #43a047;
  --mp-300: #66bb6a;
  --mp-200: #a5d6a7;
  --mp-100: #c8e6c9;
  --mp-50:  #e8f5e9;

  /* Neutrals */
  --n-900: #111815;
  --n-800: #1e2721;
  --n-700: #2e3c34;
  --n-500: #566860;
  --n-400: #7a9188;
  --n-300: #aec2b8;
  --n-200: #d4e4da;
  --n-100: #eaf2ed;
  --n-50:  #f5faf7;
  --n-0:   #ffffff;

  /* Semantic */
  --color-bg:         #f4f9f6;
  --color-surface:    #ffffff;
  --color-surface-2:  #f8fcfa;
  --color-border:     rgba(30,107,64,.15);
  --color-border-strong: rgba(30,107,64,.30);
  --color-text:       #183126;
  --color-text-mid:   #476052;
  --color-text-muted: #607066;
  --color-accent:     #2e7d32;
  --color-accent-h:   #1b5e20;
  --color-accent-s:   #43a047;

  /* UI tokens */
  --rad-sm:  8px;
  --rad-md:  12px;
  --rad-lg:  16px;
  --rad-xl:  20px;
  --rad-full: 9999px;
  --shadow-xs: 0 1px 3px rgba(13,35,24,.06);
  --shadow-sm: 0 2px 8px rgba(13,35,24,.08);
  --shadow-md: 0 6px 24px rgba(13,35,24,.10);
  --shadow-lg: 0 16px 48px rgba(13,35,24,.14);
  --trans: 180ms cubic-bezier(.16,1,.3,1);

  /* Typography */
  --font-display: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-body:    'DM Sans', 'Segoe UI', system-ui, sans-serif;

  /* Fluid type */
  --text-xs:   clamp(0.875rem, 0.82rem + 0.25vw, 0.9375rem);
  --text-sm:   clamp(0.9375rem,0.90rem + 0.2vw,  1.0625rem);
  --text-base: clamp(1.0625rem,1.02rem + 0.2vw,  1.125rem);
  --text-lg:   clamp(1.1875rem,1.12rem + 0.3vw,  1.3125rem);
  --text-xl:   clamp(1.375rem, 1.22rem + 0.7vw,  1.625rem);
  --text-2xl:  clamp(1.5rem,   1.2rem  + 1.5vw,  2rem);
}

/* DARK MODE */
body.dark-mode {
  --color-bg:         #0a1810;
  --color-surface:    #0e2018;
  --color-surface-2:  #122518;
  --color-border:     rgba(74,170,114,.18);
  --color-border-strong: rgba(74,170,114,.32);
  --color-text:       #dff0e6;
  --color-text-mid:   #a8ccb7;
  --color-text-muted: #7aaa8f;
  --color-accent:     #4aaa72;
  --color-accent-h:   #2e9158;
  --color-accent-s:   #60bc85;
  --shadow-xs: 0 1px 3px rgba(0,0,0,.20);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.28);
  --shadow-md: 0 6px 24px rgba(0,0,0,.36);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.48);
}

/* ═══════════════════════════════
   BASE RESET
═══════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
  transition: background var(--trans), color var(--trans);
}
button, input { font: inherit; color: inherit; cursor: pointer; }
button { border: none; background: none; }
img { display: block; max-width: 100%; height: auto; }
mark {
  background: rgba(255,204,0,.40);
  color: inherit;
  padding: 0 2px;
  border-radius: 3px;
}

/* ═══════════════════════════════
   PAGE WRAPPER
═══════════════════════════════ */
.duoc-page {
  max-width: 1320px;
  margin: 0 auto;
  padding: 38px 20px 56px;
}

/* ═══════════════════════════════
   HEADER — New design
═══════════════════════════════ */
.duoc-header-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 14px 16px;
  margin: 14px 0 22px;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: var(--rad-xl);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}


/* Subtle background watermark */
.duoc-header-main::after {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(30,107,64,.07) 0%, transparent 70%);
  pointer-events: none;
}

.duoc-header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  min-width: 0;
  white-space: nowrap;
}



/* Header text block */
.duoc-header-content {
  flex: 0 1 auto;
  min-width: 0;
  position: relative;
  z-index: 1;
  text-align: center;
  white-space: nowrap;
}

.duoc-header-eyebrow {
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--color-accent);
  opacity: .80;
  margin-bottom: 3px;
}

.duoc-header-title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 400;
  color: var(--color-text);
  line-height: 1.2;
  margin: 0 0 4px;
  text-align: center;
}

.duoc-header-title strong {
  color: var(--color-accent);
  font-style: italic;
}

.duoc-header-subtitle {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  font-weight: 400;
  text-align: center;
}

/* Right side of header: badge + dark toggle */
.duoc-header-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}

.duoc-logo-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  border-radius: 9px;
  transition: transform var(--trans), box-shadow var(--trans), filter var(--trans);
}
.duoc-logo-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
}
.duoc-logo-btn:active { transform: scale(.97); }
.duoc-logo-svg {
  width: 132px;
  height: 40px;
  border-radius: 9px;
  box-shadow: 0 4px 14px rgba(46,125,50,.32), inset 0 1px 0 rgba(255,255,255,.12);
  display: block;
}



/* ═══════════════════════════════
   SEARCH TOOLBAR
═══════════════════════════════ */
.duoc-search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  flex-wrap: nowrap;
  justify-content: flex-start;
  overflow: visible;
  padding-right: 280px;
  min-height: 40px;
}
.duoc-search-wrapper > * { flex-shrink: 0; }
.duoc-search-wrapper > * { flex-shrink: 0; }
.duoc-search-wrapper > * { flex-shrink: 0; }
.duoc-search-wrapper > * {
  flex-shrink: 0;
}
.duoc-count-below {
  display: inline-flex;
  width: fit-content;
  margin: 6px 0 18px 0;
  text-align: left;
  padding-left: 0;
  white-space: nowrap;
}


/* Count pill */
.duoc-count {
  background: var(--color-accent);
  color: #fff;
  padding: 6px 14px;
  border-radius: var(--rad-full);
  font-size: var(--text-sm);
  font-weight: 700;
  white-space: nowrap;
  order: 0;
  margin-right: auto;
  box-shadow: var(--shadow-xs);
  letter-spacing: .01em;
}

/* ABC Toggle */
.duoc-abc-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  gap: 5px;
  height: 40px;
  width: 58px;
  min-width: 58px;
  padding: 0;
  border-radius: var(--rad-md);
  border: 1px solid var(--color-border-strong);
  background: var(--color-surface);
  color: var(--color-accent);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--trans), color var(--trans), border-color var(--trans), box-shadow var(--trans);
  position: absolute;
  right: 206px;
  top: 0;
  letter-spacing: .02em;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1;
}
.duoc-abc-toggle svg { width: 16px; height: 16px; }
.duoc-abc-toggle:hover {
  background: var(--mp-50);
  border-color: var(--color-accent);
}
.duoc-abc-toggle.active {
  background: var(--color-accent);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(30,107,64,.28);
}
body.dark-mode .duoc-abc-toggle.active { background: var(--color-accent); }

/* Alphabet bar */
.duoc-alphabet {
  display: none;
  gap: 4px;
  align-items: center;
  align-content: center;
  order: 1;
  animation: duocFade .22s ease;
  position: absolute;
  right: 272px;
  top: 0;
  max-width: calc(100% - 340px);
  overflow-x: auto;
  overflow-y: hidden;
  flex-wrap: nowrap;
  justify-content: flex-end;
  padding-bottom: 0;
  height: 40px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.duoc-alphabet.show { display: flex; flex-wrap: nowrap; }
.duoc-alphabet::-webkit-scrollbar { width: 0; height: 0; }

@keyframes duocFade {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}
.duoc-letter {
  width: 30px; height: 30px;
  flex: 0 0 30px;
  display: flex; align-items: center; justify-content: center;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: var(--rad-sm);
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-accent);
  transition: background var(--trans), color var(--trans), border-color var(--trans), box-shadow var(--trans);
}
.duoc-letter:first-child {
  width: auto; flex-basis: auto; padding: 0 10px;
  font-size: 12px; letter-spacing: .04em;
}
.duoc-letter:hover { background: var(--mp-50); border-color: var(--color-accent); }
.duoc-letter.active {
  background: var(--color-accent);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(30,107,64,.30);
}

/* Search box */
.duoc-search-box {
  display: flex;
  align-items: center;
  padding: 0 4px 0 12px;
  height: 40px;
  width: 200px;
  min-width: 200px;
  max-width: 200px;
  flex: 0 0 200px;
  position: absolute;
  right: 0;
  top: 0;
  border-radius: var(--rad-md);
  border: 1px solid var(--color-border-strong);
  background: var(--color-surface-2);
  transition: border-color var(--trans), box-shadow var(--trans), background var(--trans), transform var(--trans);
  box-shadow: var(--shadow-xs);
}
.duoc-search-box:focus-within {
  max-width: 250px;
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px rgba(46,125,50,.12);
  background: var(--color-surface);
}
.duoc-search-box input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: var(--text-sm);
  color: var(--color-text);
  font-weight: 500;
  min-width: 0;
}
.duoc-search-box input::placeholder { color: var(--color-text-muted); font-weight: 400; }
.duoc-search-hint{position:fixed;left:50%;top:110px;transform:translateX(-50%) translateY(-8px);background:#fff;border:1px solid rgba(27,94,32,.18);box-shadow:0 8px 24px rgba(0,0,0,.10);border-radius:12px;padding:8px 12px;font-size:13px;color:#365a47;opacity:0;pointer-events:none;transition:.2s ease;z-index:9999}.duoc-search-hint.show{opacity:1;transform:translateX(-50%) translateY(0)}

.duoc-search-icon-btn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--rad-sm);
  background: transparent;
  border: none;
  color: var(--color-text-muted);
  transition: color var(--trans), background var(--trans);
  cursor: pointer;
}
.duoc-search-icon-btn:hover { color: var(--color-accent); background: var(--mp-50); }
.duoc-search-box:focus-within .duoc-search-icon-btn { color: var(--color-accent); }
.duoc-search-icon-btn svg { width: 17px; height: 17px; pointer-events: none; }

/* ═══════════════════════════════
   TIP TEXT
═══════════════════════════════ */
.duoc-tip {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.duoc-tip svg { width: 13px; height: 13px; opacity: .6; }

/* ═══════════════════════════════
   RESULTS GRID
═══════════════════════════════ */
.duoc-results {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

/* ═══════════════════════════════
   CARD
═══════════════════════════════ */
.duoc-card {
  display: flex;
  flex-direction: column;
  padding: 0;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--rad-lg);
  box-shadow: var(--shadow-xs);
  overflow: hidden;
  cursor: pointer;
  opacity: 0;
  transform: translateY(16px) scale(.97);
  transition:
    opacity .38s ease,
    transform .38s cubic-bezier(.4,0,.2,1),
    box-shadow .22s ease,
    border-color .22s ease;
  contain: content;
}
.duoc-card.is-visible { opacity: 1; transform: translateY(0) scale(1); }
.duoc-card:hover {
  transform: translateY(-6px) scale(1.005);
  box-shadow: var(--shadow-lg);
  border-color: var(--color-border-strong);
  z-index: 2;
}
.duoc-card:active { transform: scale(.97) !important; transition: .08s; }

/* Book cover area */
.duoc-card .img-wrap {
  position: relative;
  width: 100%;
  height: 140px;
  overflow: hidden;
  background: linear-gradient(145deg, #ffffff, #f7fbf8);
  border-bottom: 1px solid rgba(27,94,32,.14);
  flex-shrink: 0;
}

.duoc-book-cover {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 12px;
  color: var(--color-accent);
}

/* Subtle crosshatch pattern on book covers */
.duoc-book-cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(27,94,32,.035) 0px, rgba(27,94,32,.035) 1px, transparent 1px, transparent 16px),
    repeating-linear-gradient(-45deg, rgba(27,94,32,.03) 0px, rgba(27,94,32,.03) 1px, transparent 1px, transparent 16px);
  pointer-events: none;
}

.duoc-book-emblem {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--rad-md);
  background: rgba(46,125,50,.08);
  border: 1px solid rgba(27,94,32,.28);
  font-size: 26px;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  backdrop-filter: blur(4px);
  color: var(--color-accent);
}

.duoc-book-kicker {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  opacity: .80;
  position: relative; z-index: 1;
}
.duoc-book-year {
  font-size: 13px;
  font-weight: 600;
  opacity: .65;
  margin-top: 2px;
  position: relative; z-index: 1;
}

/* Card body */
.duoc-card-content {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 14px;
  min-width: 0;
}

.duoc-card .p-title {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text);
  margin: 0 0 6px;
  line-height: 1.35;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: break-word;
}
.duoc-card:hover .p-title { color: var(--color-accent); }

.duoc-card .card-info { flex: 1; margin-bottom: 10px; }
.duoc-card .p-info {
  margin: 0 0 3px;
  font-size: var(--text-xs);
  line-height: 1.45;
  color: var(--color-text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.duoc-card .p-info b { color: var(--color-accent); font-weight: 700; }

/* CTA button */
.duoc-open {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 8px 12px;
  background: var(--color-surface-2);
  color: var(--color-accent);
  border: 1px solid var(--color-border-strong);
  border-radius: var(--rad-sm);
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: .03em;
  text-transform: uppercase;
  transition: background var(--trans), color var(--trans), border-color var(--trans), box-shadow var(--trans);
  margin-top: auto;
  flex-shrink: 0;
}
.duoc-open svg { width: 14px; height: 14px; }
.duoc-open:hover {
  background: var(--color-accent);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(30,107,64,.28);
}

/* Dark mode card overrides */
body.dark-mode .duoc-card {
  background: var(--color-surface);
  border-color: var(--color-border);
}
body.dark-mode .duoc-card .img-wrap {
  background: linear-gradient(145deg, #0c2e1c, #061408);
}
body.dark-mode .duoc-open {
  background: rgba(74,170,114,.08);
  border-color: var(--color-border-strong);
  color: var(--color-accent);
}
body.dark-mode .duoc-open:hover {
  background: var(--color-accent);
  color: #0a1810;
}

/* ═══════════════════════════════
   LOADING / EMPTY / PROGRESS
═══════════════════════════════ */
.duoc-loading, .duoc-empty {
  grid-column: 1 / -1;
  background: var(--color-surface);
  border: 1px dashed var(--color-border-strong);
  border-radius: var(--rad-lg);
  padding: 28px;
  color: var(--color-text-muted);
  line-height: 1.7;
  font-size: var(--text-sm);
}
.duoc-sentinel { height: 1px; grid-column: 1 / -1; }
.duoc-progress {
  grid-column: 1 / -1;
  min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  font-size: var(--text-xs);
  font-weight: 600;
  gap: 6px;
}

/* ═══════════════════════════════
   FOOTER
═══════════════════════════════ */
.duoc-footer { margin: 32px 0 0; text-align: center; }
.duoc-footer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: var(--rad-full);
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  color: var(--color-text-muted);
  font-size: var(--text-xs);
  font-weight: 600;
  box-shadow: var(--shadow-xs);
}
.duoc-footer-badge svg { width: 14px; height: 14px; color: var(--color-accent); }

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
.duoc-modal {
  position: fixed;
  inset: 0;
  z-index: 10050;
  background: rgba(5,15,10,.72);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 16px;
  display: none;
  align-items: center;
  justify-content: center;
  touch-action: none;
}
.duoc-modal.show { display: flex; }

.duoc-modal-box {
  width: 100%;
  max-width: 840px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: 24px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.06);
  animation: duocModalIn .38s cubic-bezier(.25,1,.5,1) forwards;
  color: var(--color-text);
  font-family: var(--font-body);

/* Theme toggle — logo button */
(function(){
  const btn = document.getElementById('duoc-theme-btn');
  const iconG = document.getElementById('logo-theme-icon');
  /* SVG icon shapes bên trong logo (18×18 viewBox, offset translate(88,14)) */
  const MOON_PATH = '<path d="M11 2.5a8 8 0 1 0 8 9.5A6 6 0 0 1 11 2.5z" fill="white" opacity="0.70"/>';
  const SUN_PATH  = '<circle cx="9" cy="9" r="4" fill="white" opacity="0.85"/>'
    + '<line x1="9" y1="1" x2="9" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="9" y1="15" x2="9" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="1" y1="9" x2="3" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="15" y1="9" x2="17" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="3.2" y1="3.2" x2="4.6" y2="4.6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="13.4" y1="13.4" x2="14.8" y2="14.8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="14.8" y1="3.2" x2="13.4" y2="4.6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>'
    + '<line x1="4.6" y1="13.4" x2="3.2" y2="14.8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.70"/>';
  function setTheme(dark){
    document.body.classList.toggle('dark-mode', dark);
    if(iconG) iconG.innerHTML = dark ? SUN_PATH : MOON_PATH;
    if(btn) btn.setAttribute('aria-label', dark ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối');
  }
  function syncParent(){
    try {
      const pb = window.parent && window.parent.document && window.parent.document.body;
      if(!pb) return false;
      setTheme(pb.classList.contains('dark-mode'));
      new MutationObserver(function(){setTheme(pb.classList.contains('dark-mode'));})
        .observe(pb, {attributes:true, attributeFilter:['class']});
      return true;
    } catch(e){ return false; }
  }
  if(!syncParent()){
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(prefersDark);
  }
  if(btn) btn.addEventListener('click', function(){
    setTheme(!document.body.classList.contains('dark-mode'));
  });
})();
</script>

<script>
(function(){
'use strict';
const INDEX_URL='./duoc-thu-data/index.json', DATA_BASE='./duoc-thu-data/';
const PAGE_SIZE=36, LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let indexRecords=[],recordCache=new Map(),filteredResults=[],visibleCount=0,activeLetter='',lastQuery='',appendBusy=false,revealObserver=null,loadObserver=null;
const q=document.getElementById('duoc-q'),clear=document.getElementById('duoc-clear'),list=document.getElementById('duoc-results'),count=document.getElementById('duoc-count'),modal=document.getElementById('duoc-modal'),modalBox=document.getElementById('duoc-modal-box'),abcToggle=document.getElementById('duoc-abc-toggle'),alphabet=document.getElementById('duoc-alphabet');
function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fieldScore(field,query,weight){
  if(!field)return 0;
  if(field===query)return weight+900000+query.length;
  if(field.indexOf(query)>=0)return weight+700000+query.length;
  const words=query.split(' ').filter(function(w){return w.length>=2});
  if(!words.length)return 0;
  const tokens=field.split(' ').filter(Boolean);
  const hitCount=words.filter(function(w){
    return tokens.some(function(t){
      return t===w || (w.length>=4&&t.length>=4&&(t.indexOf(w)===0||w.indexOf(t)===0));
    });
  }).length;
  if(hitCount===words.length)return weight+500000+hitCount*100+query.length;
  return 0;
}
function score(r,query){
  if(!query)return 1;
  const title=norm(r.title), aliases=Array.from(new Set((r.search_aliases||r.aliases||[]).map(norm).filter(function(a){return a&&a.length>=2})));
  let best=fieldScore(title,query,200000);
  aliases.forEach(function(alias){best=Math.max(best,fieldScore(alias,query,100000))});
  return best;
}
function initialOf(r){const n=norm(r.title);return n?n.charAt(0).toUpperCase():''}
function highlight(v,query){const t=esc(v);if(!query)return t;const words=Array.from(new Set(query.split(' ').filter(x=>x.length>=3))).sort((a,b)=>b.length-a.length);if(!words.length)return t;const re=new RegExp('('+words.map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','ig');return t.replace(re,'<mark>$1</mark>')}
function cardHtml(r,query){
  const p=(r.source&&r.source.printed_pages)||{};
  const page=p.start?('tr. '+p.start+(p.end&&p.end!==p.start?'–'+p.end:'')):'';
  const aliases=(r.search_aliases||r.aliases||[]).slice(0,5).join(' · ')||'Chuyên luận thuốc';
  return '<article class="duoc-card" data-duoc-id="'+esc(r.id)+'" tabindex="0" role="button" aria-label="Xem chuyên luận '+esc(r.title)+'">'
    +'<div class="img-wrap duoc-book-cover">'
    +'<span class="duoc-book-emblem">📚</span>'
    +'<span class="duoc-book-kicker">Dược thư Quốc gia</span>'
    +'<span class="duoc-book-year">Lần xuất bản 2023</span>'
    +'</div>'
    +'<div class="duoc-card-content">'
    +'<h2 class="p-title">'+highlight(r.title,query)+'</h2>'
    +'<div class="card-info">'
    +'<p class="p-info"><b>Tên khác:</b> '+highlight(aliases,query)+'</p>'
    +'<p class="p-info"><b>Nguồn:</b> '+esc(page||'Dược thư Quốc gia Việt Nam')+'</p>'
    +'</div>'
    +'<button type="button" class="duoc-open" data-duoc-id="'+esc(r.id)+'">'
    +'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h7"/><path d="M11 10l4 2-4 2V10z"/></svg>'
    +'XEM CHUYÊN LUẬN'
    +'</button>'
    +'</div>'
    +'</article>';
}
function installRevealObserver(){if(revealObserver)revealObserver.disconnect();revealObserver=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('is-visible');revealObserver.unobserve(e.target)}})},{root:null,rootMargin:'0px 0px -8% 0px',threshold:.02});list.querySelectorAll('.duoc-card:not(.is-visible)').forEach(function(card){revealObserver.observe(card)})}
function installLoadObserver(){if(loadObserver)loadObserver.disconnect();const sentinel=list.querySelector('.duoc-sentinel');if(!sentinel)return;loadObserver=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)appendNextPage()})},{root:null,rootMargin:'420px 0px',threshold:0});loadObserver.observe(sentinel)}
function updateProgress(){const p=list.querySelector('.duoc-progress');if(p)p.textContent=visibleCount<filteredResults.length?('Đã hiển thị '+visibleCount+'/'+filteredResults.length+' chuyên luận · Cuộn xuống để tải thêm'):'Đã hiển thị đủ '+filteredResults.length+' chuyên luận'}
function appendNextPage(){if(appendBusy||visibleCount>=filteredResults.length)return;appendBusy=true;const next=filteredResults.slice(visibleCount,visibleCount+PAGE_SIZE);const sentinel=list.querySelector('.duoc-sentinel');if(sentinel)sentinel.remove();const progress=list.querySelector('.duoc-progress');if(progress)progress.remove();const holder=document.createElement('div');holder.innerHTML=next.map(function(r){return cardHtml(r,lastQuery)}).join('');while(holder.firstElementChild)list.appendChild(holder.firstElementChild);visibleCount+=next.length;const meta=document.createElement('div');meta.className='duoc-progress';list.appendChild(meta);const nextSentinel=document.createElement('div');nextSentinel.className='duoc-sentinel';list.appendChild(nextSentinel);updateProgress();installRevealObserver();installLoadObserver();appendBusy=false}
function renderResults(){if(!filteredResults.length){list.innerHTML='<div class="duoc-empty">Không tìm thấy chuyên luận phù hợp. Hãy thử tên tiếng Anh, tiếng Việt hoặc một tên đồng nghĩa của hoạt chất.</div>';return}visibleCount=0;list.innerHTML='';appendNextPage()}
function runSearch(){const query=norm(q.value);lastQuery=query;var _sb=document.getElementById('duoc-search-svg'),_cb=document.getElementById('duoc-clear-svg');if(_sb&&_cb){_sb.style.display=query?'none':'';_cb.style.display=query?'':'none';}const found=indexRecords.map(function(r){return{r:r,s:score(r,query)}}).filter(function(x){return x.s>0&&(!activeLetter||initialOf(x.r)===activeLetter)}).sort(function(a,b){return b.s-a.s||String(a.r.title).localeCompare(String(b.r.title),'vi')}).map(function(x){return x.r});filteredResults=found;const label=activeLetter?(' · Vần '+activeLetter):'';count.textContent=found.length+' chuyên luận'+label;renderResults()}
function drawAlphabet(){alphabet.innerHTML=LETTERS.map(function(l){return '<button class="duoc-letter" type="button" data-letter="'+l+'">'+l+'</button>'}).join('');alphabet.addEventListener('click',function(e){const b=e.target.closest('[data-letter]');if(!b)return;const letter=b.dataset.letter||'';if(activeLetter===letter){activeLetter='';b.classList.remove('active');alphabet.classList.remove('show');abcToggle.classList.remove('active');abcToggle.setAttribute('aria-expanded','false')}else{activeLetter=letter;alphabet.querySelectorAll('.duoc-letter').forEach(function(x){x.classList.remove('active')});b.classList.add('active');}runSearch()})}
function firstAlphabetic(v){const m=String(v||'').match(/[A-Za-zÀ-ỹ]/u);return m?m[0]:''}
function isTableFootnote(v){return /^(?:[a-z]\.|\(\*+\)|\[\*+\])\s*/iu.test(String(v||'').trim())}
function endsSentence(v){let t=String(v||'').trim();while(t&&/[\"'"'»\)\]]/.test(t.charAt(t.length-1)))t=t.slice(0,-1).trim();return/[.!?…]$/.test(t)}
function splitParagraphs(v){
  let text=String(v==null?'':v).replace(/\r/g,'').replace(/[ \t]+\n/g,'\n').replace(/\n[ \t]+/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
  if(!text)return[];
  const raw=text.split(/\n{2,}/).map(function(x){return x.replace(/\s*\n\s*/g,' ').replace(/\s{2,}/g,' ').trim()}).filter(Boolean);
  const out=[];
  raw.forEach(function(block){
    const first=firstAlphabetic(block);
    const lower=!!first&&first===first.toLocaleLowerCase('vi-VN')&&first!==first.toLocaleUpperCase('vi-VN');
    const prev=out.length?out[out.length-1]:'';
    if(prev&&lower&&!isTableFootnote(block)&&!endsSentence(prev)){out[out.length-1]=prev+' '+block;return}
    out.push(block);
  });
  return out
}
function renderText(v){return splitParagraphs(v).map(function(p){return '<p class="duoc-paragraph">'+esc(p)+'</p>'}).join('')}
async function getRecord(id){if(recordCache.has(id))return recordCache.get(id);const res=await fetch(DATA_BASE+encodeURIComponent(id)+'.json',{cache:'force-cache'});if(!res.ok)throw new Error('Không tải được chuyên luận');const rec=await res.json();recordCache.set(id,rec);return rec}
function findTable(rec,id){return(rec.tables||[]).find(function(t){return t&&t.id===id})||null}
function printedPage(rec,t){const pdf=(rec.source||{}).pdf_pages||{},printed=(rec.source||{}).printed_pages||{},n=Number(t&&t.source_pdf_page);return Number.isFinite(n)&&Number.isFinite(Number(pdf.start))&&Number.isFinite(Number(printed.start))?Number(printed.start)+(n-Number(pdf.start)):(n||'')}
function assetUrl(path){const raw=String(path||'').replace(/\\/g,'/').replace(/^\.\//,'');try{return new URL(raw,document.baseURI).href}catch(e){return encodeURI(raw)}}
function renderTable(rec,t){if(!t||!t.image_path)return '';const src=assetUrl(t.image_path);return '<figure class="duoc-table-figure" data-duoc-table-id="'+esc(t.id||'')+'"><figcaption><b>Bảng gốc từ Dược thư</b>'+(printedPage(rec,t)?' - tr. '+esc(printedPage(rec,t)):'')+'</figcaption><img class="duoc-table-image" loading="lazy" decoding="async" alt="Bảng gốc từ Dược thư" src="'+esc(src)+'" onerror="var f=this.closest(\'figure\');if(f)f.classList.add(\'duoc-table-image-error\');this.remove();"><div class="duoc-table-image-error-text">Không tải được ảnh bảng. Hãy kiểm tra thư mục duoc-thu-assets.</div></figure>'}
function renderNode(rec,node){if(!node)return '';const blocks=Array.isArray(node.blocks)&&node.blocks.length?node.blocks:(String(node.content||'').trim()?[{type:'text',text:String(node.content||'')}]:[]);return blocks.map(function(b){if(!b)return '';if(b.type==='table')return renderTable(rec,findTable(rec,b.table_id));if(b.type==='text')return '<div class="duoc-text">'+renderText(b.text||'')+'</div>';return ''}).join('')}
function renderRecord(rec){const source=rec.source||{},p=source.printed_pages||{},pages=p.start?('tr. '+p.start+(p.end&&p.end!==p.start?'–'+p.end:'')):'trang chưa xác định';let h='<button type="button" class="duoc-close" aria-label="Đóng">×</button><div class="duoc-modal-drug-header"><div class="duoc-modal-book"><span class="duoc-book-emblem">📚</span><span class="duoc-book-kicker">Dược thư</span><span class="duoc-book-year">2023</span></div><div class="duoc-modal-head"><span class="duoc-modal-badge">DƯỢC THƯ QUỐC GIA</span><h2>'+esc(rec.title)+'</h2><p>'+esc((source.book||'Dược thư Quốc gia Việt Nam')+', '+(source.edition||'2023')+', '+pages+'.')+'</p></div></div><div class="duoc-modal-body">';(rec.sections||[]).forEach(function(sec,i){const parent=renderNode(rec,sec),children=sec.render_mode==='children_only'&&Array.isArray(sec.subsections)&&sec.subsections.length;h+='<details class="duoc-section"'+(i===0?' open':'')+'><summary>'+esc(sec.title)+'</summary>';if(parent)h+='<div class="duoc-section-body">'+parent+'</div>';if(children){h+='<div class="duoc-subsections">';sec.subsections.forEach(function(sub){h+='<div class="duoc-subsection"><b>'+esc(sub.title)+'</b>'+renderNode(rec,sub)+'</div>'});h+='</div>'}h+='</details>'});return h+'</div>'}
async function openRecord(id){try{modalBox.innerHTML='<div class="duoc-loading">Đang tải chuyên luận...</div>';modal.classList.add('show');const rec=await getRecord(id);modalBox.innerHTML=renderRecord(rec);modalBox.querySelector('.duoc-close').addEventListener('click',closeModal)}catch(e){modalBox.innerHTML='<button type="button" class="duoc-close" aria-label="Đóng">×</button><div class="duoc-empty">Không tải được chuyên luận. Hãy kiểm tra thư mục <b>duoc-thu-data</b> và thử lại.</div>';modalBox.querySelector('.duoc-close').addEventListener('click',closeModal)}}
function closeModal(){modal.classList.remove('show');modalBox.innerHTML=''}
list.addEventListener('click',function(e){const b=e.target.closest('[data-duoc-id]');if(b)openRecord(b.dataset.duocId)});
list.addEventListener('keydown',function(e){if((e.key==='Enter'||e.key===' ')&&e.target&&e.target.classList&&e.target.classList.contains('duoc-card')){e.preventDefault();openRecord(e.target.dataset.duocId)}});
modal.addEventListener('click',function(e){if(e.target===modal)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&modal.classList.contains('show'))closeModal()});
const searchHint=document.createElement('div');searchHint.className='duoc-search-hint';searchHint.textContent='Nhập tên hoạt chất, biệt dược hoặc từ khóa liên quan';document.body.appendChild(searchHint);
function showHint(){searchHint.classList.add('show');clearTimeout(showHint._t);showHint._t=setTimeout(function(){searchHint.classList.remove('show')},1600)}
q.addEventListener('focus',function(){q.value=q.value; if(!q.value){q.placeholder='Tìm kiếm'; showHint()} });
q.addEventListener('blur',function(){ if(!q.value) q.placeholder='Tìm kiếm'; });
q.addEventListener('input',runSearch);
clear.addEventListener('click',function(){q.value='';q.focus();runSearch()});
abcToggle.addEventListener('click',function(){const open=!alphabet.classList.contains('show');alphabet.classList.toggle('show',open);abcToggle.classList.toggle('active',open);abcToggle.setAttribute('aria-expanded',String(open));if(!open){activeLetter='';alphabet.querySelectorAll('.duoc-letter').forEach(function(x){x.classList.remove('active')});runSearch();}});
async function init(){drawAlphabet();try{const res=await fetch(INDEX_URL,{cache:'force-cache'});if(!res.ok)throw new Error('INDEX');const data=await res.json();indexRecords=Array.isArray(data.records)?data.records:[];runSearch();const deepId=new URLSearchParams(location.search).get('duoc');if(deepId&&indexRecords.some(function(x){return x.id===deepId}))openRecord(deepId)}catch(e){count.textContent='Không tải được chỉ mục Dược thư';list.innerHTML='<div class="duoc-empty">Không tải được dữ liệu. Hãy kiểm tra rằng <b>tra-cuu-duoc-thu.html</b> và thư mục <b>duoc-thu-data</b> nằm cùng cấp trên máy chủ web.</div>'}}
init();
})();
</script>
</body>
