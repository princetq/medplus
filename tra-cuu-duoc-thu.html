<style>

:root{

*{box-sizing:border-box}

.duoc-page{max-width:1300px;margin:0 auto;padding:0 20px 42px;position:relative;z-index:1}
.duoc-header-main{display:flex;align-items:center;justify-content:center;gap:15px;margin:0 0 30px;padding:22px 25px;position:relative;background:transparent;border:none;box-shadow:none;user-select:none;-webkit-user-select:none}

.duoc-header-content{text-align:center;position:relative;z-index:1}

.duoc-header-subtitle{margin:4px 0 0;color:var(--green);font-size:13px;opacity:.85;font-weight:600;letter-spacing:.5px}
.duoc-search-wrapper,.duoc-results,.duoc-footer{position:relative;z-index:1}
.duoc-search-wrapper{display:flex;justify-content:flex-end;align-items:center;width:100%;margin-bottom:22px;gap:10px;flex-wrap:nowrap}

.duoc-abc-toggle{background:var(--g-bg);border:1px solid var(--g-border);border-radius:12px;padding:0 12px;height:42px;cursor:pointer;display:flex;align-items:center;color:var(--green);font-weight:900;transition:.2s;order:2}
.duoc-abc-toggle:hover{background:var(--g-bg-h)}.duoc-abc-toggle.active{background:var(--green-l);color:#fff;border-color:var(--green-l);box-shadow:0 2px 8px rgba(76,175,80,.4)}
.duoc-abc-toggle span{font-size:20px;line-height:1}.duoc-abc-toggle small{font-size:13px;margin-left:1px}
.duoc-alphabet{display:none;gap:4px;align-items:center;order:3;animation:duocFade .25s ease;max-width:calc(100% - 400px);overflow-x:auto;overflow-y:hidden;padding-bottom:5px}
.duoc-alphabet.show{display:flex}@keyframes duocFade{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

.duoc-search-box{display:flex;align-items:center;padding:8px 15px;width:100%;max-width:280px;height:42px;transition:.3s ease;background:var(--g-bg);border:1px solid var(--g-border);border-radius:12px;order:5}
.duoc-search-box:focus-within{max-width:320px;transform:scale(1.02);border-color:var(--green-l);background:rgba(255,255,255,.55);box-shadow:0 0 0 3px rgba(76,175,80,.15)}
.duoc-search-box svg{width:19px;height:19px;color:var(--green);margin-right:9px;flex:0 0 auto}.duoc-search-box input{flex:1;border:none;background:transparent;outline:none;font-size:16px;color:var(--green);font-weight:600;margin:0;padding:0;line-height:normal;height:auto;min-width:0}.duoc-search-box input::placeholder{color:rgba(27,94,32,.56);font-weight:500}
.duoc-clear{display:none;border:0;background:transparent;color:var(--green);font-size:24px;line-height:1;padding:0 0 0 8px}.duoc-clear.show{display:block}
.duoc-tip{font-size:13px;color:#66766b;margin:0 0 14px;font-weight:600}

.duoc-card.is-visible{opacity:1;transform:translateY(0) scale(1)}.duoc-card:hover{transform:translateY(-8px);background:var(--g-bg-h);box-shadow:0 20px 45px rgba(0,0,0,.13),0 0 0 1px rgba(255,255,255,.5)}.duoc-card:active{transform:scale(.96)!important;transition:.1s}

.duoc-card:hover .img-wrap{border-color:rgba(46,125,50,.82);box-shadow:inset 0 0 0 1px rgba(255,255,255,.82),0 5px 18px rgba(27,94,32,.18)}

.duoc-book-kicker{font-size:11px;font-weight:900;letter-spacing:.75px;text-transform:uppercase}.duoc-book-year{font-size:12px;font-weight:800;opacity:.78;margin-top:3px}
.duoc-card-content{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}.duoc-card .p-title{font-size:16px;color:var(--green-d);font-weight:800;margin:0 0 4px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}.duoc-card .card-info{margin-bottom:2px;flex:1}.duoc-card .p-info{margin:0 0 4px;font-size:12px;line-height:1.42;color:#52635a;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.duoc-card .p-info b{color:var(--green);font-weight:800}.duoc-open{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;padding:7px;background:linear-gradient(135deg,#2e7d32,#388e3c);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:auto;padding-top:7px;transition:.25s;font-family:inherit;flex-shrink:0}.duoc-open:hover{background:linear-gradient(135deg,#1b5e20,#2e7d32);transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,125,50,.3)}
mark{background:rgba(255,212,74,.52);padding:0 2px;border-radius:3px}.duoc-loading,.duoc-empty{grid-column:1/-1;background:var(--g-bg);border:1px dashed rgba(46,125,50,.35);border-radius:14px;padding:22px;color:#52635a;line-height:1.6}.duoc-sentinel{height:1px;grid-column:1/-1}.duoc-progress{grid-column:1/-1;min-height:38px;display:flex;align-items:center;justify-content:center;color:#557060;font-size:13px;font-weight:700}

.duoc-modal{position:fixed;inset:0;z-index:10050;background:rgba(0,0,0,.75);padding:15px;display:none;align-items:center;justify-content:center;transform:translateZ(0);touch-action:none}.duoc-modal.show{display:flex}.duoc-modal-box{width:100%;max-width:820px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;background:rgba(255,255,255,.96);border:1px solid #fff;border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,.2);animation:duocModalIn .45s cubic-bezier(.25,1,.5,1) forwards;transform:translateZ(0);touch-action:auto;color:#333;font-family:'Inter','Segoe UI',Roboto,Arial,sans-serif;font-size:15px;font-weight:400;letter-spacing:-.01em;-webkit-font-smoothing:antialiased}@keyframes duocModalIn{0%{opacity:0;transform:translateY(40px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}

.duoc-modal-head{min-width:0;flex:1}.duoc-modal-badge{display:inline-block;padding:5px 10px;border-radius:10px;background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;font-size:11px;font-weight:900;letter-spacing:.65px}.duoc-modal-head h2{color:var(--green-d);font-size:22px;font-weight:900;margin:6px 0 4px;line-height:1.25}.duoc-modal-head p{margin:0;color:#476052;line-height:1.45;font-size:13px;font-weight:600}.duoc-modal-body{padding:0}

<main class="duoc-page">
  <header class="duoc-header-main">

    </div>
    <div class="duoc-header-content">

    </div>
  </div>

  <p class="duoc-tip">Tìm theo tên tiếng Việt, tiếng Anh hoặc tên đồng nghĩa. Dữ liệu 743 chuyên luận được tải sẵn và hiển thị dần khi cuộn.</p>

<script>
(function(){

const INDEX_URL='./duoc-thu-data/index.json', DATA_BASE='./duoc-thu-data/';
const PAGE_SIZE=36, LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let indexRecords=[],recordCache=new Map(),filteredResults=[],visibleCount=0,activeLetter='',lastQuery='',appendBusy=false,revealObserver=null,loadObserver=null;
const q=document.getElementById('duoc-q'),clear=document.getElementById('duoc-clear'),list=document.getElementById('duoc-results'),count=document.getElementById('duoc-count'),modal=document.getElementById('duoc-modal'),modalBox=document.getElementById('duoc-modal-box'),abcToggle=document.getElementById('duoc-abc-toggle'),alphabet=document.getElementById('duoc-alphabet');
function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function isWordPhrase(h,n){return (' '+h+' ').indexOf(' '+n+' ')>=0}
/* v8.1: score only the text the user typed against a record's title/aliases.
   Do not compare a record title with its own alias: that made every record match every search. */
function fieldScore(field,query,weight){
  if(!field)return 0;
  if(field===query)return weight+900000+query.length;
  if(field.indexOf(query)>=0)return weight+700000+query.length;
  const words=query.split(' ').filter(function(w){return w.length>=2});
  if(!words.length)return 0;
  const tokens=field.split(' ').filter(Boolean);
  const hitCount=words.filter(function(w){
    return tokens.some(function(t){
      return t===w || (w.length>=4&&t.length>=4&&(t.indexOf(w)===0||w.indexOf(t)===0));
    });
  }).length;
  if(hitCount===words.length)return weight+500000+hitCount*100+query.length;
  return 0;
}
function score(r,query){
  if(!query)return 1;
  const title=norm(r.title), aliases=Array.from(new Set((r.search_aliases||r.aliases||[]).map(norm).filter(function(a){return a&&a.length>=2})));
  let best=fieldScore(title,query,200000);
  aliases.forEach(function(alias){best=Math.max(best,fieldScore(alias,query,100000))});
  return best;
}
function initialOf(r){const n=norm(r.title);return n? n.charAt(0).toUpperCase():''}
function highlight(v,query){const t=esc(v);if(!query)return t;const words=Array.from(new Set(query.split(' ').filter(x=>x.length>=3))).sort((a,b)=>b.length-a.length);if(!words.length)return t;const re=new RegExp('('+words.map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','ig');return t.replace(re,'<mark>$1</mark>')}
function cardHtml(r,query){const p=(r.source&&r.source.printed_pages)||{};const page=p.start?('tr. '+p.start+(p.end&&p.end!==p.start?'–'+p.end:'')):'';const aliases=(r.search_aliases||r.aliases||[]).slice(0,5).join(' · ')||'Chuyên luận thuốc';return '<article class="duoc-card" data-duoc-id="'+esc(r.id)+'" tabindex="0" role="button" aria-label="Xem chuyên luận '+esc(r.title)+'"><div class="img-wrap duoc-book-cover"><span class="duoc-book-emblem">📚</span><span class="duoc-book-kicker">Dược thư Quốc gia</span><span class="duoc-book-year">Lần xuất bản 2023</span></div><div class="duoc-card-content"><h2 class="p-title">'+highlight(r.title,query)+'</h2><div class="card-info"><p class="p-info"><b>Tên khác:</b> '+highlight(aliases,query)+'</p><p class="p-info"><b>Nguồn:</b> '+esc(page||'Dược thư Quốc gia Việt Nam')+'</p></div><button type="button" class="duoc-open" data-duoc-id="'+esc(r.id)+'">📚 XEM CHUYÊN LUẬN</button></div></article>'}
function installRevealObserver(){if(revealObserver)revealObserver.disconnect();revealObserver=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('is-visible');revealObserver.unobserve(e.target)}})},{root:null,rootMargin:'0px 0px -8% 0px',threshold:.02});list.querySelectorAll('.duoc-card:not(.is-visible)').forEach(function(card){revealObserver.observe(card)})}
function installLoadObserver(){if(loadObserver)loadObserver.disconnect();const sentinel=list.querySelector('.duoc-sentinel');if(!sentinel)return;loadObserver=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting)appendNextPage()})},{root:null,rootMargin:'420px 0px',threshold:0});loadObserver.observe(sentinel)}
function updateProgress(){const p=list.querySelector('.duoc-progress');if(p)p.textContent=visibleCount<filteredResults.length?('Đã hiển thị '+visibleCount+'/'+filteredResults.length+' chuyên luận · Cuộn xuống để tải thêm'):'Đã hiển thị đủ '+filteredResults.length+' chuyên luận'}
function appendNextPage(){if(appendBusy||visibleCount>=filteredResults.length)return;appendBusy=true;const next=filteredResults.slice(visibleCount,visibleCount+PAGE_SIZE);const sentinel=list.querySelector('.duoc-sentinel');if(sentinel)sentinel.remove();const progress=list.querySelector('.duoc-progress');if(progress)progress.remove();const holder=document.createElement('div');holder.innerHTML=next.map(function(r){return cardHtml(r,lastQuery)}).join('');while(holder.firstElementChild)list.appendChild(holder.firstElementChild);visibleCount+=next.length;const meta=document.createElement('div');meta.className='duoc-progress';list.appendChild(meta);const nextSentinel=document.createElement('div');nextSentinel.className='duoc-sentinel';list.appendChild(nextSentinel);updateProgress();installRevealObserver();installLoadObserver();appendBusy=false}
function renderResults(){if(!filteredResults.length){list.innerHTML='<div class="duoc-empty">Không tìm thấy chuyên luận phù hợp. Hãy thử tên tiếng Anh, tiếng Việt hoặc một tên đồng nghĩa của hoạt chất.</div>';return}visibleCount=0;list.innerHTML='';appendNextPage()}
function runSearch(){const query=norm(q.value);lastQuery=query;clear.classList.toggle('show',!!query);const found=indexRecords.map(function(r){return {r:r,s:score(r,query)}}).filter(function(x){return x.s>0 && (!activeLetter || initialOf(x.r)===activeLetter)}).sort(function(a,b){return b.s-a.s||String(a.r.title).localeCompare(String(b.r.title),'vi')}).map(function(x){return x.r});filteredResults=found;const label=activeLetter?(' · Vần '+activeLetter):'';count.textContent=query?('Tìm thấy '+found.length+' chuyên luận'+label):('Hiển thị '+found.length+' trong tổng số '+indexRecords.length+' chuyên luận'+label);renderResults()}
function drawAlphabet(){alphabet.innerHTML='<button class="duoc-letter active" type="button" data-letter="">TẤT CẢ</button>'+LETTERS.map(function(l){return '<button class="duoc-letter" type="button" data-letter="'+l+'">'+l+'</button>'}).join('');alphabet.addEventListener('click',function(e){const b=e.target.closest('[data-letter]');if(!b)return;activeLetter=b.dataset.letter||'';alphabet.querySelectorAll('.duoc-letter').forEach(function(x){x.classList.toggle('active',x===b)});runSearch()})}
function firstAlphabetic(v){const m=String(v||'').match(/[A-Za-zÀ-ỹ]/u);return m?m[0]:''}
function isTableFootnote(v){return /^(?:[a-z]\.|\(\*+\)|\[\*+\])\s*/iu.test(String(v||'').trim())}
function endsSentence(v){let t=String(v||'').trim();while(t&&/[\"'”’»\)\]]/.test(t.charAt(t.length-1)))t=t.slice(0,-1).trim();return/[.!?…]$/.test(t)}
function splitParagraphs(v){
  let text=String(v==null?'':v).replace(/\r/g,'').replace(/[ \t]+\n/g,'\n').replace(/\n[ \t]+/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
  if(!text)return[];
  const raw=text.split(/\n{2,}/).map(function(x){return x.replace(/\s*\n\s*/g,' ').replace(/\s{2,}/g,' ').trim()}).filter(Boolean);
  const out=[];
  raw.forEach(function(block){
    const first=firstAlphabetic(block);
    const lower=!!first&&first===first.toLocaleLowerCase('vi-VN')&&first!==first.toLocaleUpperCase('vi-VN');
    const prev=out.length?out[out.length-1]:'';
    if(prev&&lower&&!isTableFootnote(block)&&!endsSentence(prev)){out[out.length-1]=prev+' '+block;return}
    out.push(block);
  });
  return out
}

function renderText(v){return splitParagraphs(v).map(function(p){return '<p class="duoc-paragraph">'+esc(p)+'</p>'}).join('')}
async function getRecord(id){if(recordCache.has(id))return recordCache.get(id);const res=await fetch(DATA_BASE+encodeURIComponent(id)+'.json',{cache:'force-cache'});if(!res.ok)throw new Error('Không tải được chuyên luận');const rec=await res.json();recordCache.set(id,rec);return rec}
function findTable(rec,id){return (rec.tables||[]).find(function(t){return t&&t.id===id})||null}function printedPage(rec,t){const pdf=(rec.source||{}).pdf_pages||{},printed=(rec.source||{}).printed_pages||{},n=Number(t&&t.source_pdf_page);return Number.isFinite(n)&&Number.isFinite(Number(pdf.start))&&Number.isFinite(Number(printed.start))?Number(printed.start)+(n-Number(pdf.start)):(n||'')}function assetUrl(path){const raw=String(path||'').replace(/\\/g,'/').replace(/^\.\//,'');try{return new URL(raw,document.baseURI).href}catch(e){return encodeURI(raw)}}function renderTable(rec,t){if(!t||!t.image_path)return '';const src=assetUrl(t.image_path);return '<figure class="duoc-table-figure" data-duoc-table-id="'+esc(t.id||'')+'"><figcaption><b>Bảng gốc từ Dược thư</b>'+(printedPage(rec,t)?' - tr. '+esc(printedPage(rec,t)):'')+'</figcaption><img class="duoc-table-image" loading="lazy" decoding="async" alt="Bảng gốc từ Dược thư" src="'+esc(src)+'" onerror="var f=this.closest(\'figure\');if(f)f.classList.add(\'duoc-table-image-error\');this.remove();"><div class="duoc-table-image-error-text">Không tải được ảnh bảng. Hãy kiểm tra thư mục duoc-thu-assets.</div></figure>'}
function renderNode(rec,node){if(!node)return '';const blocks=Array.isArray(node.blocks)&&node.blocks.length?node.blocks:(String(node.content||'').trim()?[{type:'text',text:String(node.content||'')}]:[]);return blocks.map(function(b){if(!b)return '';if(b.type==='table')return renderTable(rec,findTable(rec,b.table_id));if(b.type==='text')return '<div class="duoc-text">'+renderText(b.text||'')+'</div>';return ''}).join('')}
function renderRecord(rec){const source=rec.source||{},p=source.printed_pages||{},pages=p.start?('tr. '+p.start+(p.end&&p.end!==p.start?'–'+p.end:'')):'trang chưa xác định';let h='<button type="button" class="duoc-close" aria-label="Đóng">×</button><div class="duoc-modal-drug-header"><div class="duoc-modal-book"><span class="duoc-book-emblem">📚</span><span class="duoc-book-kicker">Dược thư</span><span class="duoc-book-year">2023</span></div><div class="duoc-modal-head"><span class="duoc-modal-badge">DƯỢC THƯ QUỐC GIA</span><h2>'+esc(rec.title)+'</h2><p>'+esc((source.book||'Dược thư Quốc gia Việt Nam')+', '+(source.edition||'2023')+', '+pages+'.')+'</p></div></div><div class="duoc-modal-body">';(rec.sections||[]).forEach(function(sec,i){const parent=renderNode(rec,sec),children=sec.render_mode==='children_only'&&Array.isArray(sec.subsections)&&sec.subsections.length;h+='<details class="duoc-section"'+(i===0?' open':'')+'><summary>'+esc(sec.title)+'</summary>';if(parent)h+='<div class="duoc-section-body">'+parent+'</div>';if(children){h+='<div class="duoc-subsections">';sec.subsections.forEach(function(sub){h+='<div class="duoc-subsection"><b>'+esc(sub.title)+'</b>'+renderNode(rec,sub)+'</div>'});h+='</div>'}h+='</details>'});return h+'</div>'}
async function openRecord(id){try{modalBox.innerHTML='<div class="duoc-loading">Đang tải chuyên luận...</div>';modal.classList.add('show');const rec=await getRecord(id);modalBox.innerHTML=renderRecord(rec);modalBox.querySelector('.duoc-close').addEventListener('click',closeModal)}catch(e){modalBox.innerHTML='<button type="button" class="duoc-close" aria-label="Đóng">×</button><div class="duoc-empty">Không tải được chuyên luận. Hãy kiểm tra thư mục <b>duoc-thu-data</b> và thử lại.</div>';modalBox.querySelector('.duoc-close').addEventListener('click',closeModal)}}function closeModal(){modal.classList.remove('show');modalBox.innerHTML=''}
list.addEventListener('click',function(e){const b=e.target.closest('[data-duoc-id]');if(b)openRecord(b.dataset.duocId)});list.addEventListener('keydown',function(e){if((e.key==='Enter'||e.key===' ')&&e.target&&e.target.classList&&e.target.classList.contains('duoc-card')){e.preventDefault();openRecord(e.target.dataset.duocId)}});modal.addEventListener('click',function(e){if(e.target===modal)closeModal()});document.addEventListener('keydown',function(e){if(e.key==='Escape'&&modal.classList.contains('show'))closeModal()});q.addEventListener('input',runSearch);clear.addEventListener('click',function(){q.value='';q.focus();runSearch()});abcToggle.addEventListener('click',function(){const open=!alphabet.classList.contains('show');alphabet.classList.toggle('show',open);abcToggle.classList.toggle('active',open);abcToggle.setAttribute('aria-expanded',String(open))});
function syncParentTheme(){try{const pb=window.parent&&window.parent.document&&window.parent.document.body;if(!pb)return;const apply=function(){document.body.classList.toggle('dark-mode',pb.classList.contains('dark-mode'))};apply();new MutationObserver(apply).observe(pb,{attributes:true,attributeFilter:['class']})}catch(e){if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)document.body.classList.add('dark-mode')}}
async function init(){syncParentTheme();drawAlphabet();try{const res=await fetch(INDEX_URL,{cache:'force-cache'});if(!res.ok)throw new Error('INDEX');const data=await res.json();indexRecords=Array.isArray(data.records)?data.records:[];runSearch();const deepId=new URLSearchParams(location.search).get('duoc');if(deepId&&indexRecords.some(function(x){return x.id===deepId}))openRecord(deepId)}catch(e){count.textContent='Không tải được chỉ mục Dược thư';list.innerHTML='<div class="duoc-empty">Không tải được dữ liệu. Hãy kiểm tra rằng <b>tra-cuu-duoc-thu.html</b> và thư mục <b>duoc-thu-data</b> nằm cùng cấp trên máy chủ web.</div>'}}
init();
})();
</script>
