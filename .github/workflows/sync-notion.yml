name: Sync Notion HDSD

on:
  schedule:
    - cron: '0 */6 * * *'  # Tự động chạy mỗi 6 tiếng
  workflow_dispatch:         # Nút chạy thủ công trên GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Cho phép push dữ liệu vào repo

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Cài đặt thư viện
        run: npm install @notionhq/client@2.2.15

      - name: 🔄 Chạy script sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node sync-notion-fullsafe.js

      - name: 💾 Commit và push dữ liệu mới
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add hdsd-data/
          git diff --staged --quiet && echo "⏭️ Không có dữ liệu mới" || (git commit -m "🔄 Sync HDSD từ Notion - $(date '+%Y-%m-%d %H:%M UTC')" && git push)
